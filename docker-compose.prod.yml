services:
  api:
    image: anotagasto-api:latest
    container_name: anotagasto-api
    network_mode: host
    env_file: /home/lucas/anotagasto.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
